{% load static %}
<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Test Session System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'inspection/css/base.css' %}">
    <link rel="stylesheet" href="{% static 'inspection/css/auth.css' %}">
</head>
<body class="auth-body">
    <main class="auth-shell">
        <section class="auth-panel">
            <div class="auth-brand">
                <span class="brand-mark"><i class="bi bi-cpu"></i></span>
                <div><h1>Test Session System</h1><p>Automation QA login</p></div>
            </div>
            {% if form.errors %}<div class="alert alert-danger">Username หรือรหัสผ่านไม่ถูกต้อง</div>{% endif %}
            {% if next %}<div class="alert alert-info">กรุณาเข้าสู่ระบบก่อนใช้งาน</div>{% endif %}
            <form method="post" class="auth-form">
                {% csrf_token %}
                <input type="hidden" name="next" value="{{ next }}">
                <div class="mb-3"><label class="form-label" for="{{ form.username.id_for_label }}">Username</label><div class="input-group input-group-lg"><span class="input-group-text"><i class="bi bi-person"></i></span>{{ form.username }}</div></div>
                <div class="mb-4"><label class="form-label" for="{{ form.password.id_for_label }}">Password</label><div class="input-group input-group-lg"><span class="input-group-text"><i class="bi bi-shield-lock"></i></span>{{ form.password }}</div></div>
                <button type="submit" class="btn btn-primary btn-lg w-100 btn-icon justify-content-center"><i class="bi bi-box-arrow-in-right"></i> เข้าสู่ระบบ</button>
            </form>
        </section>
    </main>
</body>
</html>
