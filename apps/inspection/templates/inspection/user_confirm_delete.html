{% extends 'inspection/base.html' %}

{% block content %}
<div class="row justify-content-center"><div class="col-lg-6"><div class="panel danger-panel"><div class="panel-header"><div><h3 class="mb-1 fw-bold text-danger">ลบผู้ใช้</h3><p class="text-muted small mb-0">ยืนยันการลบบัญชีผู้ใช้</p></div><span class="kpi-icon danger"><i class="bi bi-exclamation-triangle"></i></span></div><div class="panel-body"><p class="mb-4">คุณต้องการลบผู้ใช้ <strong>{{ object.username }}</strong> ใช่หรือไม่?</p><form method="post" class="d-flex justify-content-end gap-2 flex-wrap">{% csrf_token %}<a href="{% url 'inspection:user_list' %}" class="btn btn-outline-secondary">ยกเลิก</a><button type="submit" class="btn btn-danger btn-icon"><i class="bi bi-trash"></i> ลบ</button></form></div></div></div></div>
{% endblock %}
