{% extends 'inspection/base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="panel danger-panel">
            <div class="panel-header">
                <div>
                    <h3 class="mb-1 fw-bold text-danger">{{ page_title }}</h3>
                    <p class="text-muted small mb-0">ยืนยันการลบ master data</p>
                </div>
                <span class="kpi-icon danger"><i class="bi bi-exclamation-triangle"></i></span>
            </div>
            <div class="panel-body">
                <p class="mb-4">คุณต้องการลบรายการ <strong>{{ object.name }}</strong> ใช่หรือไม่?</p>
                <form method="post" class="d-flex justify-content-end gap-2">
                    {% csrf_token %}
                    <a href="{% url 'inspection:dashboard' %}" class="btn btn-outline-secondary">ยกเลิก</a>
                    <button type="submit" class="btn btn-danger btn-icon"><i class="bi bi-trash"></i> ลบ</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
